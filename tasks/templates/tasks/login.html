<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');

        :root {
            --brand-primary: #0f172a;
            --brand-accent: #3b82f6;
            --bg-soft: #f1f5f9;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Assistant', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--brand-primary);
            margin-bottom: 10px;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--brand-accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            background-color: var(--brand-primary);
            border: none;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            transition: 0.2s;
            color: white;
        }

        .btn-login:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
            color: white;
        }

        .register-link { color: var(--brand-accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <div class="brand-logo"><i class="fas fa-check-double me-2"></i>TaskMaster</div>
                        <p class="text-muted fw-bold">כניסה למערכת ניהול הצוות</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">שם משתמש</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">סיסמה</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-login w-100 shadow-sm">התחבר למערכת</button>
                    </form>

                    {% if form.errors %}
                        <div class="alert alert-danger mt-3 small border-0 text-center py-2">פרטי התחברות שגויים</div>
                    {% endif %}

                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="small text-muted mb-1">עדיין אין לך חשבון?</p>
                        <a href="{% url 'register' %}" class="register-link">צור חשבון חדש בחינם</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
