<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>{% if edit_mode %}עריכת משימה{% else %}יצירת משימה{% endif %} | TaskMaster</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        :root { --brand-primary: #0f172a; --brand-accent: #3b82f6; --bg-soft: #f8fafc; --border-color: #e2e8f0; }
        body { background-color: var(--bg-soft); font-family: 'Assistant', sans-serif; color: var(--brand-primary); height: 100vh; display: flex; align-items: center; }
        .card-custom { background: white; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); padding: 40px; width: 100%; }
        .header-section { text-align: center; margin-bottom: 35px; }
        .team-badge { background: #eff6ff; color: var(--brand-accent); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; display: inline-block; margin-bottom: 10px; }
        h2 { font-weight: 700; font-size: 1.6rem; color: var(--brand-primary); }
        .form-label { font-size: 0.9rem; font-weight: 600; color: #475569; margin-bottom: 8px; }
        .form-control { border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; font-size: 0.95rem; transition: all 0.2s; }
        .btn-submit { background: var(--brand-primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-cancel { background: transparent; color: #64748b; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; font-weight: 600; text-decoration: none; text-align: center; display: block; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-custom">
                    <div class="header-section">
                        <span class="team-badge">צוות: {{ user.profile.team_name }}</span>
                        <h2>{% if edit_mode %}עריכת משימה{% else %}יצירת משימה חדשה{% endif %}</h2>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">כותרת המשימה</label>
                            {{ form.title }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">תיאור המשימה</label>
                            {{ form.description }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">תאריך יעד</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="far fa-calendar-alt"></i></span>
                                {{ form.deadline }}
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-submit">
                                <i class="fas fa-save me-2"></i> {% if edit_mode %}שמור שינויים{% else %}שמירה ופרסום לצוות{% endif %}
                            </button>
                            <a href="{% url 'task_list' %}" class="btn btn-cancel">ביטול וחזרה</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
